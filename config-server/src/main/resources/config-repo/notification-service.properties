# Eureka instance configuration for localhost routing
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
# ============================================
# NOTIFICATION SERVICE SPECIFIC CONFIGURATION
# ============================================

# Service Port
server.port=8087

# JWT Configuration
jwt.secret=edulinkSecretKey2024VeryLongSecretKeyForJWTGenerationEduLinkSystem
jwt.expiration=86400000

# Logging
logging.level.com.edulink.notificationservice=DEBUG
