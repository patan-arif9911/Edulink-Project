spring.application.name=api-gateway
server.port=9090
#spring.config.import=optional:configserver:http://localhost:8888

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.discovery.locator.include-expression=true

spring.cloud.client.hostname=localhost
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

spring.cloud.gateway.filter.forwarded.enabled=false

# Resilience4J Circuit Breaker Config
resilience4j.circuitbreaker.instances.defaultCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.defaultCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.defaultCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.defaultCB.permittedNumberOfCallsInHalfOpenState=3

# Routes (ordered: specific paths first, catch-alls last)

# [0] Attendance Service - specific paths BEFORE /student/** and /teacher/** catch-alls
spring.cloud.gateway.routes[0].id=attendance-service
spring.cloud.gateway.routes[0].uri=lb://attendance-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/attendance/**,/teacher/mark-attendance/**,/teacher/attendance,/student/attendance,/admin/attendance-report
# NOTE: teacher attendance paths listed explicitly so they match BEFORE the catch-all routes [3],[4].
# /teacher/mark-attendance/** covers both /teacher/mark-attendance and /teacher/mark-attendance/bulk.
# /teacher/attendance is the new GET endpoint for hydrating the marking table.
spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback
spring.cloud.gateway.routes[0].filters[1].name=Retry
spring.cloud.gateway.routes[0].filters[1].args.retries=3
spring.cloud.gateway.routes[0].filters[1].args.statuses=SERVICE_UNAVAILABLE
spring.cloud.gateway.routes[0].filters[1].args.backoff.firstBackoff=100ms
spring.cloud.gateway.routes[0].filters[1].args.backoff.maxBackoff=1000ms
spring.cloud.gateway.routes[0].filters[1].args.backoff.factor=2
spring.cloud.gateway.routes[0].filters[1].args.backoff.basedOnPreviousValue=false

# [1] Exam Service - teacher exam paths BEFORE /teacher/** catch-all
spring.cloud.gateway.routes[1].id=exam-service
spring.cloud.gateway.routes[1].uri=lb://exam-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/exam/**,/teacher/create-exam,/teacher/grade-student,/teacher/exam-submissions/**
spring.cloud.gateway.routes[1].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback
spring.cloud.gateway.routes[1].filters[1].name=Retry
spring.cloud.gateway.routes[1].filters[1].args.retries=3
spring.cloud.gateway.routes[1].filters[1].args.statuses=SERVICE_UNAVAILABLE
spring.cloud.gateway.routes[1].filters[1].args.backoff.firstBackoff=100ms
spring.cloud.gateway.routes[1].filters[1].args.backoff.maxBackoff=1000ms
spring.cloud.gateway.routes[1].filters[1].args.backoff.factor=2
spring.cloud.gateway.routes[1].filters[1].args.backoff.basedOnPreviousValue=false

# [2] Course Service - teacher/students-by-class BEFORE /teacher/** catch-all
spring.cloud.gateway.routes[2].id=course-service
spring.cloud.gateway.routes[2].uri=lb://course-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/course/**,/internal/course/**,/teacher/students-by-class
spring.cloud.gateway.routes[2].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback
spring.cloud.gateway.routes[2].filters[1].name=Retry
spring.cloud.gateway.routes[2].filters[1].args.retries=3
spring.cloud.gateway.routes[2].filters[1].args.statuses=SERVICE_UNAVAILABLE
spring.cloud.gateway.routes[2].filters[1].args.backoff.firstBackoff=100ms
spring.cloud.gateway.routes[2].filters[1].args.backoff.maxBackoff=1000ms
spring.cloud.gateway.routes[2].filters[1].args.backoff.factor=2
spring.cloud.gateway.routes[2].filters[1].args.backoff.basedOnPreviousValue=false

# [3] Student Service
spring.cloud.gateway.routes[3].id=student-service
spring.cloud.gateway.routes[3].uri=lb://student-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/student/**
spring.cloud.gateway.routes[3].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback
spring.cloud.gateway.routes[3].filters[1].name=Retry
spring.cloud.gateway.routes[3].filters[1].args.retries=3
spring.cloud.gateway.routes[3].filters[1].args.statuses=SERVICE_UNAVAILABLE
spring.cloud.gateway.routes[3].filters[1].args.backoff.firstBackoff=100ms
spring.cloud.gateway.routes[3].filters[1].args.backoff.maxBackoff=1000ms
spring.cloud.gateway.routes[3].filters[1].args.backoff.factor=2
spring.cloud.gateway.routes[3].filters[1].args.backoff.basedOnPreviousValue=false

# [4] Identity Service - /teacher/** catch-all (remaining teacher endpoints)
spring.cloud.gateway.routes[4].id=identity-service
spring.cloud.gateway.routes[4].uri=lb://identity-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/auth/**,/admin/**,/operator/**,/compliance/identity/**,/board/**,/regulator/**,/teacher/**
spring.cloud.gateway.routes[4].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback
spring.cloud.gateway.routes[4].filters[1].name=Retry
spring.cloud.gateway.routes[4].filters[1].args.retries=3
spring.cloud.gateway.routes[4].filters[1].args.statuses=SERVICE_UNAVAILABLE
spring.cloud.gateway.routes[4].filters[1].args.methods=GET,POST
spring.cloud.gateway.routes[4].filters[1].args.exceptions=java.io.IOException,java.util.concurrent.TimeoutException
spring.cloud.gateway.routes[4].filters[1].args.backoff.firstBackoff=100ms
spring.cloud.gateway.routes[4].filters[1].args.backoff.maxBackoff=1000ms
spring.cloud.gateway.routes[4].filters[1].args.backoff.factor=2
spring.cloud.gateway.routes[4].filters[1].args.backoff.basedOnPreviousValue=false

# [5] Compliance Service
spring.cloud.gateway.routes[5].id=compliance-service
spring.cloud.gateway.routes[5].uri=lb://compliance-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/compliance/**
spring.cloud.gateway.routes[5].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback
spring.cloud.gateway.routes[5].filters[1].name=Retry
spring.cloud.gateway.routes[5].filters[1].args.retries=3
spring.cloud.gateway.routes[5].filters[1].args.statuses=SERVICE_UNAVAILABLE
spring.cloud.gateway.routes[5].filters[1].args.backoff.firstBackoff=100ms
spring.cloud.gateway.routes[5].filters[1].args.backoff.maxBackoff=1000ms
spring.cloud.gateway.routes[5].filters[1].args.backoff.factor=2
spring.cloud.gateway.routes[5].filters[1].args.backoff.basedOnPreviousValue=false

# [6] Notification Service
spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=lb://notification-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/notifications/**
spring.cloud.gateway.routes[6].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback
spring.cloud.gateway.routes[6].filters[1].name=Retry
spring.cloud.gateway.routes[6].filters[1].args.retries=3
spring.cloud.gateway.routes[6].filters[1].args.statuses=SERVICE_UNAVAILABLE
spring.cloud.gateway.routes[6].filters[1].args.backoff.firstBackoff=100ms
spring.cloud.gateway.routes[6].filters[1].args.backoff.maxBackoff=1000ms
spring.cloud.gateway.routes[6].filters[1].args.backoff.factor=2
spring.cloud.gateway.routes[6].filters[1].args.backoff.basedOnPreviousValue=false

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=DEBUG

