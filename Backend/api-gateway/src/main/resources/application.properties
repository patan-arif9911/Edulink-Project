spring.application.name=api-gateway
server.port=8060
#spring.config.import=optional:configserver:http://localhost:8888

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.discovery.locator.include-expression=true

spring.cloud.gateway.routes[0].id=student-service
spring.cloud.gateway.routes[0].uri=lb://student-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/student/**
spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback

spring.cloud.gateway.routes[1].id=course-service

# Attendance Service Route
spring.cloud.gateway.routes[3].id=attendance-service
spring.cloud.gateway.routes[3].uri=lb://attendance-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/attendance/**
spring.cloud.gateway.routes[3].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback

# Route[7] removed — attendance controller now uses /attendance prefix, handled by route[3]

# Compliance Service Route
spring.cloud.gateway.routes[4].id=compliance-service
spring.cloud.gateway.routes[4].uri=lb://compliance-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/compliance/**
spring.cloud.gateway.routes[4].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback

# Exam Service Route
spring.cloud.gateway.routes[5].id=exam-service
spring.cloud.gateway.routes[5].uri=lb://exam-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/exam/**
spring.cloud.gateway.routes[5].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback

# Notification Service Route
spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=lb://notification-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/notifications/**
spring.cloud.gateway.routes[6].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback

spring.cloud.gateway.routes[1].uri=lb://course-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/course/**
spring.cloud.gateway.routes[1].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback

spring.cloud.gateway.filter.forwarded.enabled=false

spring.cloud.gateway.routes[2].id=identity-service
spring.cloud.gateway.routes[2].uri=lb://identity-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/auth/**,/admin/**,/operator/**,/compliance/identity/**,/teacher/**
spring.cloud.gateway.routes[2].filters[0]=CircuitBreaker=name=defaultCB,fallbackUri=/fallback

spring.cloud.client.hostname=localhost
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

# ?? Global CORS Configuration ??
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.corsConfigurations.[/**].maxAge=3600
