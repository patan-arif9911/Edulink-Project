# Eureka instance configuration for localhost routing
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
# ============================================
# API GATEWAY SPECIFIC CONFIGURATION
# ============================================

# Service Port
server.port=8060

# JWT Configuration
jwt.secret=edulinkSecretKey2024VeryLongSecretKeyForJWTGenerationEduLinkSystem
jwt.expiration=86400000

# Gateway Routes (handled in main application.properties)
logging.level.org.springframework.cloud.gateway=DEBUG
