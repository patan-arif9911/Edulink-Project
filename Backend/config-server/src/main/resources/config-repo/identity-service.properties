# Eureka instance configuration for localhost routing
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
# ============================================
# IDENTITY SERVICE SPECIFIC CONFIGURATION
# ============================================

# Service Port
server.port=8081

# JWT Configuration
jwt.secret=edulinkSecretKey2024VeryLongSecretKeyForJWTGenerationEduLinkSystem
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Logging
logging.level.com.edulink.identityservice=DEBUG
