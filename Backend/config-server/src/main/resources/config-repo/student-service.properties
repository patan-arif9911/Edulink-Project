# Eureka instance configuration for localhost routing
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
# ============================================
# STUDENT SERVICE SPECIFIC CONFIGURATION
# ============================================

# Service Port
server.port=8082

# MongoDB Configuration for GridFS
spring.data.mongodb.uri=mongodb://localhost:27017/edulink_student

# JWT Configuration
jwt.secret=edulinkSecretKey2024VeryLongSecretKeyForJWTGenerationEduLinkSystem
jwt.expiration=86400000

# Remote service URLs
exam.service.url=http://localhost:8084
attendance.service.url=http://localhost:8085

# Logging
logging.level.com.edulink.studentservice=DEBUG
logging.file.name=student-service.log
